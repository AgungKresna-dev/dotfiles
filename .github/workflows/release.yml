name: Automated Release

on:
  push:
    tags:
      - 'v*' # Terpicu hanya ketika Anda membuat tag baru (misal: git tag v1.0.0)

permissions:
  contents: write # Butuh izin menulis untuk membuat halaman Release

jobs:
  create-release:
    name: Deploy Professional Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Changelog and Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true # Otomatis merangkum semua judul commit menjadi changelog resmi
          draft: false
          prerelease: false
