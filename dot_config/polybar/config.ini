; ==============================================================================
; Polybar Reference Configuration for i3wm
; Managed via Chezmoi | Uses Lilex Nerd Font
; ==============================================================================

[colors]
; Palet Warna Gelap Universal (Bisa disesuaikan lewat xsettingsd/theme Anda)
background = #1E1E2E
background-alt = #313244
foreground = #CDD6F4
primary = #89B4FA
secondary = #F5E0DC
alert = #F38BA8
disabled = #6C7086

[bar/main]
width = 100%
height = 28pt
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

padding-left = 1
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

; Menggunakan Lilex Nerd Font Anda untuk Teks & Ikon
font-0 = "Lilex Nerd Font:size=10;2"

; Susunan Modul (Kiri, Tengah, Kanan)
modules-left = xworkspaces xwindow
modules-right = filesystem pulseaudio memory cpu battery date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

tray-position = right
tray-padding = 2

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/filesystem
interval = 25
mount-0 = /
label-mounted = 💾 %mountpoint% %percentage_used%%
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "🔊 "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>
label-volume = %percentage%%
label-muted = 🔇 muted
label-muted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "🧠 "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "⚙️ "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/battery]
type = internal/battery
full-at = 99
low-at = 5
battery = BAT0
adapter = ADP1
poll-interval = 5
format-charging = ⚡ <label-charging>
format-discharging = 🔋 <label-discharging>
label-charging = %percentage%%
label-discharging = %percentage%%

[module/date]
type = internal/date
interval = 1
date = %Y-%m-%d %H:%M:%S
label = 📅 %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true
