## Variables
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -as terminal-features ",*:RGB"

set-option -g xterm-keys on
setw -g aggressive-resize on
set -g set-titles on
set -g set-titles-string "#T"

set -g set-clipboard on
set -g mouse on
set -g detach-on-destroy no-detached
set -g history-limit 5000

set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

## Prefix Key
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

unbind r
bind r source-file $HOME/.config/tmux/tmux.conf

set-window-option -g mode-keys vi
bind -n C-S-c copy-mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel "xclip -selection clipboard -i"
unbind -T copy-mode-vi MouseDragEnd1Pane

bind -n C-p display-popup -E "tmux list-commands | fzf --reverse | cut -d ' ' -f 1 | xargs -I {} tmux {}"
bind -n C-S-h display-popup -E "history | fzf --reverse --header ' Command History' --border --info=inline | cut -c 8- | xargs -I {} tmux send-keys -t {last} '{}'"
bind -n C-S-p display-popup -E "rg --line-number --column --no-heading --color=always --smart-case . | fzf --ansi --delimiter : --preview 'bat --style=numbers --color=always --highlight-line {2} {1}'"

## Horizontal Split
unbind %
bind | split-window -h -c "#{pane_current_path}"

## Vertical Split
unbind '"'
bind - split-window -v -c "#{pane_current_path}"

bind -n C-t new-window -c "#{pane_current_path}"
bind -n C-S-t command-prompt -I "#{b:pane_current_path}" -p "Nama Session Baru:" "new-session -A -s '%%' -c '#{pane_current_path}'"
bind -n C-S-w unlink-window -k
bind -n C-S-s kill-session
bind -n C-Tab last-window
bind -n C-w choose-tree -Zw
bind -n C-s choose-tree -Zs
bind -n C-S-l send-keys -R C-l \; clear-history
bind c new-window -c "#{pane_current_path}"

## Navigating Panes
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

## Switch Windows Next/Prev
bind -n C-PageUp previous-window
bind -n C-PageDown next-window
bind -n M-PageUp previous-window
bind -n M-PageDown next-window

## Select Window 0-9
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-0 select-window -t 0

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-logging'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @plugin 'sainnhe/tmux-fzf'
TMUX_FZF_LAUNCH_KEY="C-f"

set -g @plugin 'thepante/tmux-git-autofetch'
set -g @git-autofetch-skip-paths ".*"
set -g @git-autofetch-scan-paths "~/Projects/.*|.*\/probandoski"
set -g @git-autofetch-frequency "1"
set -g @git-autofetch-logging "true"

set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g automatic-rename-format "#{window_icon} #{b:pane_current_path}"

set -g @plugin 'ofirgall/tmux-window-name'
set -g @tmux_window_name_shells "['bash', 'fish', 'sh', 'zsh']"
set -g @tmux_window_dir_programs "['nvim', 'vim', 'vi', 'git']"
set -g @tmux_window_name_ignored_programs "['sqlite3']" # Default is []
set -g @tmux_window_name_max_name_len "20"
set -g @tmux_window_name_use_tilde "False"
set -g @tmux_window_name_show_program_args "True"
# Show only icons
#set -g @tmux_window_name_icon_style "'icon'"
# Show icons with program names with active dir
#set -g @tmux_window_name_icon_style "'dir_and_icon'"
# Show icons with program names
set -g @tmux_window_name_icon_style "'name_and_icon'"
# Default Value:
#set -g @tmux_window_name_icon_style "'name'"

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'timvw/tmux-assistant-resurrect'
#set -g @resurrect-capture-pane-contents 'on'

set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'  # minutes

#set -g @plugin 'any-context/lazyclaude'

set -g @plugin "soyuka/tmux-current-pane-hostname"
set -g @plugin 'MunifTanjim/tmux-mode-indicator'
set -g @plugin 'MaximilianGaedig/tmux-filter'

set -g @plugin 'tardunge/tmux-gh'
set-option -g @tmux_gh_icon " " # defaults to "Github:"
set-option -g @tmux_gh_default_uname "AgungKresna-dev" # defaults to "tmux-gh-uname"

### Dracula Theme Color Palette
background="#282A36"
foreground="#F8F8F2"
red="#FF5555"
orange="#FFB86C"
yellow="#F1FA8C"
green="#50FA7B"
cyan="#8BE9FD"
purple="#BD93F9"
pink="#FF79C6"

set -g status "on"
set -g status-bg "${background}"
set -g status-position "top"
set -g status-left-length 100
set -g status-right-length 100
set -g status-justify "left"
set -g status-interval 5
set -g status-style "fg=${foreground}, bg=default"
set -g status-left "#[fg=${green}, bold] #S #[fg=${foreground}, nobold]| #[fg=${orange}]#U#[fg=${yellow}]@#H#{?#{pane_ssh_port},:#{pane_ssh_port},}#[default] |"
set -g status-right "#(gitmux -cfg $HOME/.gitmux.conf '#{pane_current_path}') | #{tmux_gh_uname} | %H:%M %d-%m-%Y #{tmux_mode_indicator}"
set -g window-status-current-format "#[fg=${purple}, bold]  #[underscore]#I:#W"
set -g window-status-format " #I:#W"
set -g window-status-activity-style "fg=${foreground}, bg=${background}, none"
set -g window-status-separator ""
set -g window-status-style "fg=${foreground}, bg=${background}, none"
set -g message-style "fg=${green}, bg=${background}, align=centre"
set -g message-command-style "fg=${green}, bg=${background}, align=centre"
set -g mode-style "fg=${foreground}, bg={green}"
set -g pane-border-style "#[fg=${purple}, nobold]"
set -g pane-active-border-style "#[fg=${purple}, bold]"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
